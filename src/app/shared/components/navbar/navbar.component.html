<mat-toolbar color="primary">
  <a class="brand" routerLink="/today" aria-label="Lekoteka — strona główna">
    <mat-icon aria-hidden="true">medication</mat-icon>
    <span class="app-title">Lekoteka</span>
  </a>

  <nav class="links" aria-label="Główna nawigacja">
    <a
      routerLink="/today"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Dziś"
    >
      <mat-icon aria-hidden="true">today</mat-icon>
      <span class="link-label">Dziś</span>
    </a>
    <a
      routerLink="/schedules"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Harmonogramy"
    >
      <mat-icon aria-hidden="true">medication</mat-icon>
      <span class="link-label">Harmonogramy</span>
    </a>
    <a
      routerLink="/settings"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Ustawienia"
    >
      <mat-icon aria-hidden="true">settings</mat-icon>
      <span class="link-label">Ustawienia</span>
    </a>
    <a
      routerLink="/help"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Pomoc"
    >
      <mat-icon aria-hidden="true">help_outline</mat-icon>
      <span class="link-label">Pomoc</span>
    </a>
  </nav>

  <button
    mat-icon-button
    type="button"
    aria-label="Wyloguj się"
    (click)="authService.signOutUser()"
  >
    <mat-icon aria-hidden="true">logout</mat-icon>
  </button>
</mat-toolbar>
